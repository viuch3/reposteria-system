<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Melipostres</title>
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <main class="login-shell">
      <section class="login-hero">
        <img class="brand-logo brand-logo-large" src="../assets/logo_reposteria.png" alt="Logo Melipostres" />
        <p class="eyebrow">Acceso operativo</p>
        <h1>Inicia sesion y abre la operacion del dia.</h1>
        <p class="lead">
          Diseñado para caja, producción y administración con acceso rápido a
          ventas, inventario y seguimiento de lotes.
        </p>
        <div class="quick-links">
          <a href="./dashboard.html">Dashboard</a>
          <a href="./ventas.html">Ventas</a>
          <a href="./inventario.html">Inventario</a>
        </div>
      </section>

      <section class="login-panel">
        <div class="login-card">
          <p class="eyebrow">Melipostres</p>
          <h2>Bienvenido</h2>
          <form class="form-grid" style="grid-template-columns: 1fr;" data-login-form>
            <div class="field">
              <label for="email">Correo</label>
              <input class="input" id="email" type="email" placeholder="admin@reposteria.com" />
            </div>
            <div class="field">
              <label for="password">Contrasena</label>
              <input class="input" id="password" type="password" placeholder="Ingresa tu contrasena" />
            </div>
            <div class="field">
              <span class="badge badge-warning" data-login-message>Ingresa tus credenciales para continuar.</span>
            </div>
            <button class="button button-primary" type="submit">Iniciar sesion</button>
          </form>
        </div>
      </section>
    </main>
    <script type="module" src="../js/auth.js"></script>
  </body>
</html>
